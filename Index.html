<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeVerse - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>CodeVerse 🚀</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to CodeVerse</h1>
  <p>Learn • Practice • Conquer</p>

  <input type="text" placeholder="Search coding challenges...">
</section>

<section class="cards">
  <div class="card">💻 C Programming</div>
  <div class="card">🐍 Python</div>
  <div class="card">☕ Java</div>
  <div class="card">🧠 DSA Basics</div>
</section>

<section class="quiz">
  <h2>Quick Quiz</h2>
  <p>Which language is best for AI?</p>

  <button onclick="checkAnswer('wrong')">C</button>
  <button onclick="checkAnswer('correct')">Python</button>
  <button onclick="checkAnswer('wrong')">HTML</button>

  <p id="result"></p>
</section>

<section class="challenge">
  <h2>🔥 Daily Challenge</h2>
  <button onclick="generateChallenge()">Get Challenge</button>
  <p id="challenge"></p>
</section>

<script src="script.js"></script>
